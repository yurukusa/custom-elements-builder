<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Custom Elements Builder — Web Components Visual Editor</title>
<meta name="description" content="Build Web Components visually. Define custom elements with lifecycle callbacks, observed attributes, properties, and shadow DOM. Live preview, ES6 export, 5+ presets.">

<meta property="og:description" content="Build Web Components visually. Define custom elements with lifecycle callbacks, observed attributes, properties. Live preview and ES6 export.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://yurukusa.github.io/custom-elements-builder/">
<meta name="twitter:card" content="summary_large_image">
<link rel="canonical" href="https://yurukusa.github.io/custom-elements-builder/">

{
  "@context": "https://schema.org",
  "@type": "WebApplication",
  "name": "Custom Elements Builder",
  "description": "Build Web Components visually. Define custom elements with lifecycle callbacks, observed attributes, properties, and shadow DOM. Live preview, ES6 export, 5+ presets.",
  "url": "https://yurukusa.github.io/custom-elements-builder/",
  "applicationCategory": "DeveloperApplication",
  "operatingSystem": "Any",
  "offers": {"@type": "Offer", "price": "0", "priceCurrency": "USD"},
  "author": {"@type": "Organization", "name": "yurukusa", "url": "https://github.com/yurukusa"}
}
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0a;--surface:#141414;--surface2:#1a1a1a;--border:#262626;
  --border-focus:#3b82f6;--text:#e6e6e6;--text-dim:#888;--text-faint:#555;
  --accent:#3b82f6;--accent-hover:#2563eb;--accent-bg:#0d1b2a;
  --success:#22c55e;--warn:#f59e0b;--error:#ef4444;
  --radius:10px;--mono:'SF Mono',Monaco,'Cascadia Code','Fira Code',monospace;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}
button{cursor:pointer;font-family:inherit}
input,textarea,select{font-family:inherit}

/* Layout */
.app{display:grid;grid-template-rows:auto 1fr;height:100vh;overflow:hidden}
header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--border);background:var(--surface)}
header h1{font-size:1.1rem;color:#fff;display:flex;align-items:center;gap:8px}
header h1 .icon{font-size:1.3rem}
.header-actions{display:flex;gap:8px;align-items:center}

.main{display:grid;grid-template-columns:340px 1fr 1fr;height:100%;overflow:hidden}
@media(max-width:1100px){.main{grid-template-columns:1fr;grid-template-rows:auto 1fr 1fr}}

/* Buttons */
.btn{padding:7px 16px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text-dim);font-size:0.82rem;font-weight:600;transition:all 0.15s}
.btn:hover{background:#222;color:var(--text)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:var(--accent-hover)}
.btn-sm{padding:5px 12px;font-size:0.78rem}
.btn-group{display:flex;gap:4px}

/* Panels */
.panel{border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.panel:last-child{border-right:none}
.panel-header{padding:10px 16px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.panel-header h2{font-size:0.85rem;color:var(--text-dim);font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.panel-body{padding:16px;overflow-y:auto;flex:1}

/* Form Controls */
.field{margin-bottom:14px}
.field label{display:block;font-size:0.78rem;color:var(--text-dim);margin-bottom:5px;font-weight:600}
.field input,.field textarea,.field select{width:100%;padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:0.85rem;outline:none;transition:border-color 0.15s}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--border-focus)}
.field textarea{font-family:var(--mono);font-size:0.8rem;resize:vertical;min-height:60px;line-height:1.5}
.field .hint{font-size:0.72rem;color:var(--text-faint);margin-top:3px}

.field-row{display:flex;gap:8px;align-items:flex-end}
.field-row .field{flex:1;margin-bottom:0}

/* Sections */
.section{margin-bottom:20px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.section-header{padding:8px 12px;background:var(--surface);display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.section-header h3{font-size:0.82rem;color:var(--text);font-weight:600}
.section-header .toggle{font-size:0.7rem;color:var(--text-faint);transition:transform 0.2s}
.section-header.collapsed .toggle{transform:rotate(-90deg)}
.section-body{padding:12px;border-top:1px solid var(--border)}
.section-body.hidden{display:none}

/* Tags / Pills */
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.tag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:14px;background:var(--accent-bg);color:#4da6ff;font-size:0.75rem;font-weight:600;border:1px solid #1b3a5c}
.tag .remove{cursor:pointer;opacity:0.6;font-size:0.7rem}
.tag .remove:hover{opacity:1}

/* Checkbox */
.check-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:0.82rem;color:var(--text-dim)}
.check-row input[type="checkbox"]{accent-color:var(--accent)}

/* Code Output */
.code-area{background:#0d0d0d;border:1px solid var(--border);border-radius:var(--radius);padding:14px;font-family:var(--mono);font-size:0.78rem;line-height:1.6;color:#c9d1d9;overflow:auto;white-space:pre;tab-size:2;height:100%}
.code-area .kw{color:#ff7b72}
.code-area .str{color:#a5d6ff}
.code-area .fn{color:#d2a8ff}
.code-area .cm{color:#8b949e}
.code-area .cls{color:#7ee787}
.code-area .num{color:#79c0ff}
.code-area .prop{color:#ffa657}

/* Preview */
.preview-frame{width:100%;height:100%;border:none;background:#fff;border-radius:var(--radius)}
.preview-container{flex:1;padding:16px;display:flex;flex-direction:column;gap:12px;overflow:hidden}
.preview-box{flex:1;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;min-height:200px;position:relative}
.preview-controls{display:flex;gap:8px;flex-shrink:0}

/* Presets */
.preset-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:16px}
.preset-card{padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;transition:all 0.15s;text-align:center}
.preset-card:hover{border-color:var(--accent);background:var(--accent-bg)}
.preset-card.active{border-color:var(--accent);background:var(--accent-bg)}
.preset-card .preset-icon{font-size:1.2rem;margin-bottom:4px}
.preset-card .preset-name{font-size:0.78rem;color:var(--text);font-weight:600}
.preset-card .preset-desc{font-size:0.68rem;color:var(--text-faint);margin-top:2px}

/* Properties list */
.prop-item{display:flex;align-items:center;gap:8px;padding:8px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;background:var(--surface)}
.prop-item .prop-name{font-family:var(--mono);font-size:0.8rem;color:#ffa657;flex:1}
.prop-item .prop-type{font-size:0.72rem;color:var(--text-faint);padding:2px 8px;border-radius:10px;background:var(--surface2)}
.prop-item .prop-remove{color:var(--error);opacity:0.5;cursor:pointer;font-size:0.8rem;padding:2px 6px}
.prop-item .prop-remove:hover{opacity:1}

/* Tabs for code/preview */
.output-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);flex-shrink:0}
.output-tab{padding:8px 16px;font-size:0.8rem;font-weight:600;color:var(--text-faint);background:transparent;border:none;border-bottom:2px solid transparent;transition:all 0.15s}
.output-tab:hover{color:var(--text)}
.output-tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;padding:10px 20px;border-radius:8px;background:var(--success);color:#fff;font-size:0.85rem;font-weight:600;opacity:0;transform:translateY(10px);transition:all 0.3s;pointer-events:none;z-index:100}
.toast.show{opacity:1;transform:translateY(0)}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#444}

@media(max-width:1100px){
  .main{height:auto;overflow:auto}
  .panel{border-right:none;border-bottom:1px solid var(--border)}
  .app{height:auto;min-height:100vh}
}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1><span class="icon">&#x1F9E9;</span> Custom Elements Builder</h1>
    <div class="header-actions">
      <button class="btn btn-sm" onclick="resetAll()">Reset</button>
      <button class="btn btn-sm btn-primary" onclick="copyCode()">Copy Code</button>
      <button class="btn btn-sm" onclick="downloadCode()">Download .js</button>
    </div>
  </header>

  <div class="main">
    <!-- Left Panel: Config -->
    <div class="panel">
      <div class="panel-header">
        <h2>Configuration</h2>
      </div>
      <div class="panel-body">
        <!-- Presets -->
        <div class="section">
          <div class="section-header" onclick="toggleSection(this)">
            <h3>Presets</h3>
            <span class="toggle">&#9660;</span>
          </div>
          <div class="section-body">
            <div class="preset-grid" id="presetGrid"></div>
          </div>
        </div>

        <!-- Element Name -->
        <div class="section">
          <div class="section-header" onclick="toggleSection(this)">
            <h3>Element Definition</h3>
            <span class="toggle">&#9660;</span>
          </div>
          <div class="section-body">
            <div class="field">
              <label>Tag Name</label>
              <input type="text" id="tagName" value="my-counter" placeholder="my-element" oninput="onTagNameChange(this.value)">
              <div class="hint">Must contain a hyphen (e.g., my-element)</div>
            </div>
            <div class="field">
              <label>Class Name</label>
              <input type="text" id="className" value="MyCounter" placeholder="MyElement" oninput="generate()">
            </div>
            <div class="field">
              <label>Extends</label>
              <select id="extendsEl" onchange="generate()">
                <option value="HTMLElement">HTMLElement (autonomous)</option>
                <option value="HTMLButtonElement">HTMLButtonElement</option>
                <option value="HTMLDivElement">HTMLDivElement</option>
                <option value="HTMLInputElement">HTMLInputElement</option>
                <option value="HTMLParagraphElement">HTMLParagraphElement</option>
              </select>
            </div>
            <div class="check-row">
              <input type="checkbox" id="useShadow" checked onchange="generate()">
              <label for="useShadow">Use Shadow DOM</label>
            </div>
            <div class="check-row">
              <input type="checkbox" id="shadowMode" checked onchange="generate()">
              <label for="shadowMode">Shadow DOM open mode</label>
            </div>
          </div>
        </div>

        <!-- Observed Attributes -->
        <div class="section">
          <div class="section-header" onclick="toggleSection(this)">
            <h3>Observed Attributes</h3>
            <span class="toggle">&#9660;</span>
          </div>
          <div class="section-body">
            <div class="field-row">
              <div class="field">
                <input type="text" id="newAttr" placeholder="attribute-name" onkeydown="if(event.key==='Enter'){addAttribute()}">
              </div>
              <button class="btn btn-sm" onclick="addAttribute()">Add</button>
            </div>
            <div class="tag-list" id="attrList"></div>
          </div>
        </div>

        <!-- Properties -->
        <div class="section">
          <div class="section-header" onclick="toggleSection(this)">
            <h3>Properties (Getters/Setters)</h3>
            <span class="toggle">&#9660;</span>
          </div>
          <div class="section-body">
            <div class="field-row" style="margin-bottom:8px">
              <div class="field">
                <input type="text" id="newPropName" placeholder="propertyName" onkeydown="if(event.key==='Enter'){addProperty()}">
              </div>
              <div class="field" style="max-width:100px">
                <select id="newPropType">
                  <option value="String">String</option>
                  <option value="Number">Number</option>
                  <option value="Boolean">Boolean</option>
                  <option value="Object">Object</option>
                  <option value="Array">Array</option>
                </select>
              </div>
              <button class="btn btn-sm" onclick="addProperty()">Add</button>
            </div>
            <div class="check-row">
              <input type="checkbox" id="propReflect" checked>
              <label for="propReflect">Reflect to attribute</label>
            </div>
            <div id="propList"></div>
          </div>
        </div>

        <!-- Lifecycle Callbacks -->
        <div class="section">
          <div class="section-header" onclick="toggleSection(this)">
            <h3>Lifecycle Callbacks</h3>
            <span class="toggle">&#9660;</span>
          </div>
          <div class="section-body">
            <div class="check-row">
              <input type="checkbox" id="cbConnected" checked onchange="generate()">
              <label for="cbConnected">connectedCallback</label>
            </div>
            <div class="check-row">
              <input type="checkbox" id="cbDisconnected" onchange="generate()">
              <label for="cbDisconnected">disconnectedCallback</label>
            </div>
            <div class="check-row">
              <input type="checkbox" id="cbAttributeChanged" checked onchange="generate()">
              <label for="cbAttributeChanged">attributeChangedCallback</label>
            </div>
            <div class="check-row">
              <input type="checkbox" id="cbAdopted" onchange="generate()">
              <label for="cbAdopted">adoptedCallback</label>
            </div>
          </div>
        </div>

        <!-- Template & Styles -->
        <div class="section">
          <div class="section-header" onclick="toggleSection(this)">
            <h3>Template &amp; Styles</h3>
            <span class="toggle">&#9660;</span>
          </div>
          <div class="section-body">
            <div class="field">
              <label>CSS (inside Shadow DOM)</label>
              <textarea id="elStyles" rows="4" oninput="generate()" placeholder=":host { display: block; }"></textarea>
            </div>
            <div class="field">
              <label>HTML Template</label>
              <textarea id="elTemplate" rows="4" oninput="generate()" placeholder="<div>Hello</div>"></textarea>
            </div>
          </div>
        </div>

        <!-- Connected Callback Body -->
        <div class="section">
          <div class="section-header" onclick="toggleSection(this)">
            <h3>connectedCallback Body</h3>
            <span class="toggle">&#9660;</span>
          </div>
          <div class="section-body">
            <div class="field">
              <textarea id="connectedBody" rows="4" oninput="generate()" placeholder="// Setup logic here"></textarea>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Middle Panel: Code Output -->
    <div class="panel">
      <div class="output-tabs">
        <button class="output-tab active" data-tab="code" onclick="switchTab('code')">Generated Code</button>
        <button class="output-tab" data-tab="usage" onclick="switchTab('usage')">Usage Example</button>
      </div>
      <div class="panel-body" style="padding:0;display:flex;flex-direction:column">
        <div id="codeOutput" class="code-area" style="flex:1;margin:0;border:none;border-radius:0"></div>
        <div id="usageOutput" class="code-area" style="flex:1;margin:0;border:none;border-radius:0;display:none"></div>
      </div>
    </div>

    <!-- Right Panel: Preview -->
    <div class="panel">
      <div class="panel-header">
        <h2>Live Preview</h2>
        <div class="btn-group">
          <button class="btn btn-sm" onclick="refreshPreview()">Refresh</button>
        </div>
      </div>
      <div class="preview-container">
        <div class="preview-box">
          <iframe id="previewFrame" class="preview-frame" sandbox="allow-scripts"></iframe>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// --- State ---
const state = {
  attributes: [],
  properties: [],
};

// --- Presets ---
const PRESETS = [
  {
    name: 'Counter Button',
    icon: '&#x1F522;',
    desc: 'Click to increment',
    config: {
      tagName: 'my-counter',
      className: 'MyCounter',
      extendsEl: 'HTMLElement',
      useShadow: true,
      shadowMode: true,
      attributes: ['count', 'step'],
      properties: [
        { name: 'count', type: 'Number', reflect: true },
        { name: 'step', type: 'Number', reflect: true }
      ],
      cbConnected: true,
      cbDisconnected: false,
      cbAttributeChanged: true,
      cbAdopted: false,
      styles: `:host { display: inline-block; }
button {
  padding: 12px 24px;
  font-size: 18px;
  border: 2px solid #3b82f6;
  background: #1e3a5f;
  color: #fff;
  border-radius: 8px;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.15s;
}
button:hover { background: #2563eb; }
.count { font-weight: bold; font-size: 1.2em; }`,
      template: `<button><span class="count">0</span> clicks</button>`,
      connectedBody: `const btn = this.shadowRoot.querySelector('button');
    const countEl = this.shadowRoot.querySelector('.count');
    const step = parseInt(this.getAttribute('step')) || 1;
    let count = parseInt(this.getAttribute('count')) || 0;
    countEl.textContent = count;
    btn.addEventListener('click', () => {
      count += step;
      countEl.textContent = count;
      this.setAttribute('count', count);
      this.dispatchEvent(new CustomEvent('count-changed', { detail: { count } }));
    });`
    }
  },
  {
    name: 'Collapsible',
    icon: '&#x1F4C2;',
    desc: 'Expand/collapse panel',
    config: {
      tagName: 'my-collapsible',
      className: 'MyCollapsible',
      extendsEl: 'HTMLElement',
      useShadow: true,
      shadowMode: true,
      attributes: ['open', 'heading'],
      properties: [
        { name: 'open', type: 'Boolean', reflect: true },
        { name: 'heading', type: 'String', reflect: true }
      ],
      cbConnected: true,
      cbDisconnected: false,
      cbAttributeChanged: true,
      cbAdopted: false,
      styles: `:host { display: block; border: 1px solid #333; border-radius: 8px; overflow: hidden; margin: 8px 0; }
.header {
  padding: 12px 16px; background: #1a1a1a; cursor: pointer;
  display: flex; justify-content: space-between; align-items: center;
  color: #e6e6e6; font-weight: 600; user-select: none;
}
.header:hover { background: #222; }
.arrow { transition: transform 0.2s; font-size: 0.8em; }
.arrow.open { transform: rotate(90deg); }
.content { padding: 0 16px; max-height: 0; overflow: hidden; transition: max-height 0.3s ease, padding 0.3s ease; color: #ccc; }
.content.open { max-height: 500px; padding: 12px 16px; }`,
      template: `<div class="header">
  <span class="title">Collapsible</span>
  <span class="arrow">&#9654;</span>
</div>
<div class="content"><slot></slot></div>`,
      connectedBody: `const header = this.shadowRoot.querySelector('.header');
    const title = this.shadowRoot.querySelector('.title');
    const arrow = this.shadowRoot.querySelector('.arrow');
    const content = this.shadowRoot.querySelector('.content');
    title.textContent = this.getAttribute('heading') || 'Toggle';
    const update = () => {
      const isOpen = this.hasAttribute('open');
      content.classList.toggle('open', isOpen);
      arrow.classList.toggle('open', isOpen);
    };
    header.addEventListener('click', () => {
      this.toggleAttribute('open');
      update();
    });
    update();`
    }
  },
  {
    name: 'Tabs',
    icon: '&#x1F4D1;',
    desc: 'Tabbed content panels',
    config: {
      tagName: 'my-tabs',
      className: 'MyTabs',
      extendsEl: 'HTMLElement',
      useShadow: true,
      shadowMode: true,
      attributes: ['active-tab'],
      properties: [
        { name: 'activeTab', type: 'Number', reflect: true }
      ],
      cbConnected: true,
      cbDisconnected: false,
      cbAttributeChanged: true,
      cbAdopted: false,
      styles: `:host { display: block; border: 1px solid #333; border-radius: 8px; overflow: hidden; }
.tab-bar { display: flex; background: #141414; border-bottom: 1px solid #333; }
.tab-btn {
  padding: 10px 20px; border: none; background: transparent; color: #888;
  cursor: pointer; font-size: 14px; font-weight: 600; border-bottom: 2px solid transparent;
  transition: all 0.15s;
}
.tab-btn:hover { color: #ccc; }
.tab-btn.active { color: #3b82f6; border-bottom-color: #3b82f6; }
.panels { padding: 16px; color: #e6e6e6; }
::slotted([slot]) { display: none; }
::slotted(.active-panel) { display: block; }`,
      template: `<div class="tab-bar"></div>
<div class="panels"><slot></slot></div>`,
      connectedBody: `const tabBar = this.shadowRoot.querySelector('.tab-bar');
    const panels = Array.from(this.children);
    panels.forEach((panel, i) => {
      const btn = document.createElement('button');
      btn.className = 'tab-btn';
      btn.textContent = panel.getAttribute('data-label') || 'Tab ' + (i + 1);
      btn.addEventListener('click', () => this.activateTab(i));
      tabBar.appendChild(btn);
    });
    this.activateTab(parseInt(this.getAttribute('active-tab')) || 0);

    // Add method to prototype inside connected for demo simplicity
    if (!this.activateTab._bound) {
      this.activateTab = (index) => {
        const btns = tabBar.querySelectorAll('.tab-btn');
        btns.forEach((b, i) => b.classList.toggle('active', i === index));
        panels.forEach((p, i) => p.classList.toggle('active-panel', i === index));
        this.setAttribute('active-tab', index);
      };
      this.activateTab._bound = true;
      this.activateTab(parseInt(this.getAttribute('active-tab')) || 0);
    }`
    }
  },
  {
    name: 'Modal Dialog',
    icon: '&#x1F5D4;',
    desc: 'Show/close overlay',
    config: {
      tagName: 'my-modal',
      className: 'MyModal',
      extendsEl: 'HTMLElement',
      useShadow: true,
      shadowMode: true,
      attributes: ['open', 'modal-title'],
      properties: [
        { name: 'open', type: 'Boolean', reflect: true },
        { name: 'modalTitle', type: 'String', reflect: true }
      ],
      cbConnected: true,
      cbDisconnected: true,
      cbAttributeChanged: true,
      cbAdopted: false,
      styles: `:host { display: block; }
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  display: none; align-items: center; justify-content: center; z-index: 1000;
}
.overlay.open { display: flex; }
.dialog {
  background: #1a1a1a; border: 1px solid #333; border-radius: 12px;
  padding: 24px; min-width: 320px; max-width: 500px; position: relative; color: #e6e6e6;
}
.dialog h2 { margin-bottom: 12px; font-size: 1.1rem; }
.close-btn {
  position: absolute; top: 12px; right: 16px; background: none; border: none;
  color: #888; font-size: 1.2rem; cursor: pointer;
}
.close-btn:hover { color: #fff; }
.trigger { padding: 10px 20px; background: #3b82f6; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
.trigger:hover { background: #2563eb; }`,
      template: `<button class="trigger">Open Modal</button>
<div class="overlay">
  <div class="dialog">
    <button class="close-btn">&times;</button>
    <h2>Modal Title</h2>
    <slot></slot>
  </div>
</div>`,
      connectedBody: `const overlay = this.shadowRoot.querySelector('.overlay');
    const trigger = this.shadowRoot.querySelector('.trigger');
    const closeBtn = this.shadowRoot.querySelector('.close-btn');
    const titleEl = this.shadowRoot.querySelector('h2');
    titleEl.textContent = this.getAttribute('modal-title') || 'Dialog';
    const show = () => { overlay.classList.add('open'); this.setAttribute('open', ''); };
    const hide = () => { overlay.classList.remove('open'); this.removeAttribute('open'); };
    trigger.addEventListener('click', show);
    closeBtn.addEventListener('click', hide);
    overlay.addEventListener('click', (e) => { if (e.target === overlay) hide(); });
    this._keyHandler = (e) => { if (e.key === 'Escape') hide(); };
    document.addEventListener('keydown', this._keyHandler);
    if (this.hasAttribute('open')) show();`
    }
  },
  {
    name: 'Form Input',
    icon: '&#x1F4DD;',
    desc: 'Labeled input with validation',
    config: {
      tagName: 'my-input',
      className: 'MyInput',
      extendsEl: 'HTMLElement',
      useShadow: true,
      shadowMode: true,
      attributes: ['label', 'value', 'type', 'required', 'pattern', 'error-message'],
      properties: [
        { name: 'value', type: 'String', reflect: true },
        { name: 'label', type: 'String', reflect: true },
        { name: 'errorMessage', type: 'String', reflect: true }
      ],
      cbConnected: true,
      cbDisconnected: false,
      cbAttributeChanged: true,
      cbAdopted: false,
      styles: `:host { display: block; margin: 8px 0; }
label { display: block; font-size: 13px; color: #aaa; margin-bottom: 4px; font-weight: 600; }
input {
  width: 100%; padding: 10px 14px; border: 1px solid #333; border-radius: 8px;
  background: #0d0d0d; color: #e6e6e6; font-size: 14px; outline: none;
  transition: border-color 0.15s;
}
input:focus { border-color: #3b82f6; }
input.invalid { border-color: #ef4444; }
.error { font-size: 12px; color: #ef4444; margin-top: 4px; display: none; }
.error.show { display: block; }`,
      template: `<label></label>
<input type="text">
<div class="error"></div>`,
      connectedBody: `const label = this.shadowRoot.querySelector('label');
    const input = this.shadowRoot.querySelector('input');
    const error = this.shadowRoot.querySelector('.error');
    label.textContent = this.getAttribute('label') || '';
    input.type = this.getAttribute('type') || 'text';
    input.value = this.getAttribute('value') || '';
    const pattern = this.getAttribute('pattern');
    const required = this.hasAttribute('required');
    const errMsg = this.getAttribute('error-message') || 'Invalid input';
    const validate = () => {
      let valid = true;
      if (required && !input.value) valid = false;
      if (pattern && input.value && !new RegExp(pattern).test(input.value)) valid = false;
      input.classList.toggle('invalid', !valid);
      error.classList.toggle('show', !valid);
      error.textContent = errMsg;
      this.setAttribute('value', input.value);
      this.dispatchEvent(new CustomEvent('value-changed', { detail: { value: input.value, valid } }));
      return valid;
    };
    input.addEventListener('input', validate);
    input.addEventListener('blur', validate);`
    }
  },
  {
    name: 'Tooltip',
    icon: '&#x1F4AC;',
    desc: 'Hover to reveal text',
    config: {
      tagName: 'my-tooltip',
      className: 'MyTooltip',
      extendsEl: 'HTMLElement',
      useShadow: true,
      shadowMode: true,
      attributes: ['text', 'position'],
      properties: [
        { name: 'text', type: 'String', reflect: true },
        { name: 'position', type: 'String', reflect: true }
      ],
      cbConnected: true,
      cbDisconnected: false,
      cbAttributeChanged: true,
      cbAdopted: false,
      styles: `:host { display: inline-block; position: relative; }
.trigger { cursor: pointer; }
.tip {
  position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%);
  background: #333; color: #fff; padding: 6px 12px; border-radius: 6px;
  font-size: 13px; white-space: nowrap; pointer-events: none;
  opacity: 0; transition: opacity 0.15s;
}
:host(:hover) .tip { opacity: 1; }
.tip::after {
  content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
  border: 5px solid transparent; border-top-color: #333;
}`,
      template: `<span class="trigger"><slot></slot></span>
<span class="tip"></span>`,
      connectedBody: `const tip = this.shadowRoot.querySelector('.tip');
    tip.textContent = this.getAttribute('text') || 'Tooltip';`
    }
  }
];

// --- Init ---
function init() {
  renderPresets();
  loadPreset(0);
}

function renderPresets() {
  const grid = document.getElementById('presetGrid');
  grid.innerHTML = PRESETS.map((p, i) => `
    <div class="preset-card" data-index="${i}" onclick="loadPreset(${i})">
      <div class="preset-icon">${p.icon}</div>
      <div class="preset-name">${p.name}</div>
      <div class="preset-desc">${p.desc}</div>
    </div>
  `).join('');
}

function loadPreset(index) {
  const preset = PRESETS[index];
  const c = preset.config;

  document.getElementById('tagName').value = c.tagName;
  document.getElementById('className').value = c.className;
  document.getElementById('extendsEl').value = c.extendsEl;
  document.getElementById('useShadow').checked = c.useShadow;
  document.getElementById('shadowMode').checked = c.shadowMode;
  document.getElementById('cbConnected').checked = c.cbConnected;
  document.getElementById('cbDisconnected').checked = c.cbDisconnected;
  document.getElementById('cbAttributeChanged').checked = c.cbAttributeChanged;
  document.getElementById('cbAdopted').checked = c.cbAdopted;
  document.getElementById('elStyles').value = c.styles;
  document.getElementById('elTemplate').value = c.template;
  document.getElementById('connectedBody').value = c.connectedBody;

  state.attributes = [...c.attributes];
  state.properties = c.properties.map(p => ({...p}));

  renderAttributes();
  renderProperties();

  // Highlight active preset
  document.querySelectorAll('.preset-card').forEach((card, i) => {
    card.classList.toggle('active', i === index);
  });

  generate();
}

// --- Attributes ---
function addAttribute() {
  const input = document.getElementById('newAttr');
  const name = input.value.trim().toLowerCase();
  if (!name || state.attributes.includes(name)) return;
  state.attributes.push(name);
  input.value = '';
  renderAttributes();
  generate();
}

function removeAttribute(name) {
  state.attributes = state.attributes.filter(a => a !== name);
  renderAttributes();
  generate();
}

function renderAttributes() {
  const list = document.getElementById('attrList');
  list.innerHTML = state.attributes.map(a => `
    <span class="tag">${a} <span class="remove" onclick="removeAttribute('${a}')">&times;</span></span>
  `).join('');
}

// --- Properties ---
function addProperty() {
  const nameInput = document.getElementById('newPropName');
  const typeSelect = document.getElementById('newPropType');
  const name = nameInput.value.trim();
  if (!name || state.properties.find(p => p.name === name)) return;
  state.properties.push({
    name,
    type: typeSelect.value,
    reflect: document.getElementById('propReflect').checked
  });
  nameInput.value = '';
  renderProperties();
  generate();
}

function removeProperty(name) {
  state.properties = state.properties.filter(p => p.name !== name);
  renderProperties();
  generate();
}

function renderProperties() {
  const list = document.getElementById('propList');
  list.innerHTML = state.properties.map(p => `
    <div class="prop-item">
      <span class="prop-name">${p.name}</span>
      <span class="prop-type">${p.type}</span>
      <span class="prop-remove" onclick="removeProperty('${p.name}')">&times;</span>
    </div>
  `).join('');
}

// --- Tag Name Change ---
function onTagNameChange(val) {
  // Auto-generate class name from tag name
  const cls = val.split('-').map(s => s.charAt(0).toUpperCase() + s.slice(1)).join('');
  document.getElementById('className').value = cls;
  generate();
}

// --- Section Toggle ---
function toggleSection(header) {
  header.classList.toggle('collapsed');
  const body = header.nextElementSibling;
  body.classList.toggle('hidden');
}

// --- Tab Switch ---
function switchTab(tab) {
  document.querySelectorAll('.output-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.getElementById('codeOutput').style.display = tab === 'code' ? '' : 'none';
  document.getElementById('usageOutput').style.display = tab === 'usage' ? '' : 'none';
}

// --- Code Generation ---
function generate() {
  const tagName = document.getElementById('tagName').value.trim() || 'my-element';
  const className = document.getElementById('className').value.trim() || 'MyElement';
  const extendsEl = document.getElementById('extendsEl').value;
  const useShadow = document.getElementById('useShadow').checked;
  const shadowOpen = document.getElementById('shadowMode').checked;
  const cbConnected = document.getElementById('cbConnected').checked;
  const cbDisconnected = document.getElementById('cbDisconnected').checked;
  const cbAttributeChanged = document.getElementById('cbAttributeChanged').checked;
  const cbAdopted = document.getElementById('cbAdopted').checked;
  const styles = document.getElementById('elStyles').value;
  const template = document.getElementById('elTemplate').value;
  const connectedBody = document.getElementById('connectedBody').value;

  let code = '';
  const attrs = state.attributes;
  const props = state.properties;

  // Class declaration
  code += `class ${className} extends ${extendsEl} {\n`;

  // Observed attributes
  if (attrs.length > 0) {
    code += `  static get observedAttributes() {\n`;
    code += `    return [${attrs.map(a => `'${a}'`).join(', ')}];\n`;
    code += `  }\n\n`;
  }

  // Constructor
  code += `  constructor() {\n`;
  code += `    super();\n`;
  if (useShadow) {
    code += `    this.attachShadow({ mode: '${shadowOpen ? 'open' : 'closed'}' });\n`;
  }
  if (useShadow && (styles || template)) {
    code += `    this.shadowRoot.innerHTML = \`\n`;
    if (styles) {
      code += `      <style>${styles}</style>\n`;
    }
    if (template) {
      code += `      ${template}\n`;
    }
    code += `    \`;\n`;
  }
  code += `  }\n`;

  // Properties
  props.forEach(prop => {
    const attrName = prop.name.replace(/([A-Z])/g, '-$1').toLowerCase();
    code += `\n`;
    // Getter
    code += `  get ${prop.name}() {\n`;
    if (prop.type === 'Boolean') {
      code += `    return this.hasAttribute('${attrName}');\n`;
    } else if (prop.type === 'Number') {
      code += `    return Number(this.getAttribute('${attrName}')) || 0;\n`;
    } else if (prop.type === 'Object' || prop.type === 'Array') {
      code += `    try { return JSON.parse(this.getAttribute('${attrName}')); } catch { return ${prop.type === 'Array' ? '[]' : '{}'}; }\n`;
    } else {
      code += `    return this.getAttribute('${attrName}') || '';\n`;
    }
    code += `  }\n`;

    // Setter
    code += `\n  set ${prop.name}(val) {\n`;
    if (prop.reflect) {
      if (prop.type === 'Boolean') {
        code += `    if (val) {\n      this.setAttribute('${attrName}', '');\n    } else {\n      this.removeAttribute('${attrName}');\n    }\n`;
      } else if (prop.type === 'Object' || prop.type === 'Array') {
        code += `    this.setAttribute('${attrName}', JSON.stringify(val));\n`;
      } else {
        code += `    this.setAttribute('${attrName}', val);\n`;
      }
    } else {
      code += `    this._${prop.name} = val;\n`;
    }
    code += `  }\n`;
  });

  // connectedCallback
  if (cbConnected) {
    code += `\n  connectedCallback() {\n`;
    if (connectedBody.trim()) {
      connectedBody.split('\n').forEach(line => {
        code += `    ${line}\n`;
      });
    } else {
      code += `    // Element added to DOM\n`;
    }
    code += `  }\n`;
  }

  // disconnectedCallback
  if (cbDisconnected) {
    code += `\n  disconnectedCallback() {\n`;
    code += `    // Element removed from DOM — clean up event listeners, observers, etc.\n`;
    code += `  }\n`;
  }

  // attributeChangedCallback
  if (cbAttributeChanged && attrs.length > 0) {
    code += `\n  attributeChangedCallback(name, oldValue, newValue) {\n`;
    code += `    if (oldValue === newValue) return;\n`;
    attrs.forEach((attr, i) => {
      const prefix = i === 0 ? 'if' : '} else if';
      code += `    ${prefix} (name === '${attr}') {\n`;
      code += `      // Handle '${attr}' change\n`;
    });
    if (attrs.length > 0) code += `    }\n`;
    code += `  }\n`;
  }

  // adoptedCallback
  if (cbAdopted) {
    code += `\n  adoptedCallback() {\n`;
    code += `    // Element moved to a new document\n`;
    code += `  }\n`;
  }

  code += `}\n\n`;

  // customElements.define
  if (extendsEl === 'HTMLElement') {
    code += `customElements.define('${tagName}', ${className});\n`;
  } else {
    const builtinTag = {
      'HTMLButtonElement': 'button',
      'HTMLDivElement': 'div',
      'HTMLInputElement': 'input',
      'HTMLParagraphElement': 'p'
    }[extendsEl] || 'div';
    code += `customElements.define('${tagName}', ${className}, { extends: '${builtinTag}' });\n`;
  }

  // Store raw code for copy/download
  state.rawCode = code;

  // Syntax highlight for display
  document.getElementById('codeOutput').innerHTML = highlightJS(code);

  // Usage example
  generateUsage(tagName, className, extendsEl, attrs, props);

  // Update preview
  updatePreview(code, tagName);
}

function generateUsage(tagName, className, extendsEl, attrs, props) {
  let usage = '';

  usage += `<!-- Import the component -->\n`;
  usage += `<script type="module" src="./${tagName}.js"><\/script>\n\n`;

  usage += `<!-- Use in HTML -->\n`;
  if (extendsEl === 'HTMLElement') {
    usage += `<${tagName}`;
    attrs.forEach(a => {
      const prop = props.find(p => p.name.replace(/([A-Z])/g, '-$1').toLowerCase() === a);
      if (prop) {
        if (prop.type === 'Boolean') usage += ` ${a}`;
        else if (prop.type === 'Number') usage += ` ${a}="0"`;
        else usage += ` ${a}=""`;
      } else {
        usage += ` ${a}=""`;
      }
    });
    usage += `></${tagName}>\n`;
  } else {
    const builtinTag = { 'HTMLButtonElement': 'button', 'HTMLDivElement': 'div', 'HTMLInputElement': 'input', 'HTMLParagraphElement': 'p' }[extendsEl] || 'div';
    usage += `<${builtinTag} is="${tagName}"></${builtinTag}>\n`;
  }

  usage += `\n<!-- JavaScript API -->\n`;
  usage += `<script>\n`;
  usage += `  const el = document.querySelector('${tagName}');\n`;
  props.forEach(p => {
    if (p.type === 'String') usage += `  el.${p.name} = 'value';\n`;
    else if (p.type === 'Number') usage += `  el.${p.name} = 42;\n`;
    else if (p.type === 'Boolean') usage += `  el.${p.name} = true;\n`;
    else if (p.type === 'Array') usage += `  el.${p.name} = [1, 2, 3];\n`;
    else usage += `  el.${p.name} = { key: 'value' };\n`;
  });
  usage += `<\/script>\n`;

  document.getElementById('usageOutput').innerHTML = highlightJS(usage);
}

// --- Syntax Highlighting ---
function highlightJS(code) {
  return code
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/(\/\/.*)/g, '<span class="cm">$1</span>')
    .replace(/(\/\*[\s\S]*?\*\/)/g, '<span class="cm">$1</span>')
    .replace(/\b(class|extends|static|get|set|return|if|else|const|let|var|new|this|super|try|catch|function|import|export|default|typeof|instanceof)\b/g, '<span class="kw">$1</span>')
    .replace(/('(?:[^'\\]|\\.)*'|`(?:[^`\\]|\\.)*`|"(?:[^"\\]|\\.)*")/g, '<span class="str">$1</span>')
    .replace(/\b(\d+\.?\d*)\b/g, '<span class="num">$1</span>')
    .replace(/\b(customElements|document|console|window|shadowRoot|innerHTML|addEventListener|removeEventListener|setAttribute|getAttribute|removeAttribute|hasAttribute|toggleAttribute|querySelector|querySelectorAll|dispatchEvent|createElement|appendChild|textContent|classList|className)\b/g, '<span class="fn">$1</span>');
}

// --- Preview ---
let previewTimeout;
function updatePreview(code, tagName) {
  clearTimeout(previewTimeout);
  previewTimeout = setTimeout(() => {
    const frame = document.getElementById('previewFrame');
    const doc = `<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: -apple-system, sans-serif; padding: 24px; background: #1a1a1a; color: #e6e6e6; }
  h3 { font-size: 14px; color: #888; margin-bottom: 12px; }
</style>
</head>
<body>
<h3>Live Preview</h3>
<${tagName}></${tagName}>
<script type="module">
${code}
<\/script>
</body>
</html>`;
    // Use srcdoc for sandboxed preview
    frame.srcdoc = doc;
  }, 300);
}

function refreshPreview() {
  generate();
}

// --- Actions ---
function copyCode() {
  if (!state.rawCode) return;
  navigator.clipboard.writeText(state.rawCode).then(() => showToast('Code copied!'));
}

function downloadCode() {
  if (!state.rawCode) return;
  const tagName = document.getElementById('tagName').value.trim() || 'my-element';
  const blob = new Blob([state.rawCode], { type: 'text/javascript' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${tagName}.js`;
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('Downloaded ' + tagName + '.js');
}

function resetAll() {
  loadPreset(0);
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

// --- Boot ---
init();
</script>
</body>
